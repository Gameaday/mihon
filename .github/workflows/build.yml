name: Build & Test
on:
  pull_request:
    paths:
      - '**'
      - '!**.md'
      - '!i18n/src/commonMain/moko-resources/**/strings.xml'
      - '!i18n/src/commonMain/moko-resources/**/plurals.xml'
      - 'i18n/src/commonMain/moko-resources/base/strings.xml'
      - 'i18n/src/commonMain/moko-resources/base/plurals.xml'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test App
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Restore google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Architecture fitness – no android.* imports in domain modules
        run: |
          # The :core:domain and :domain modules must remain pure Kotlin with zero
          # Android imports so that business logic can be tested on the JVM without
          # an Android runtime. Any android.* import in those source trees is an
          # architectural violation that must be resolved before merging.
          VIOLATIONS=$(grep -rn --include="*.kt" "^\s*import android\." \
            core/domain/src domain/src 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::android.* imports found in domain modules (architectural violation):"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: Architecture fitness – no Injekt.get() outside legacy shim
        run: |
          # Injekt.get() is preserved only in the legacy compatibility shim
          # (core/common/src/main/kotlin/uy/kohesive/injekt/Injekt.kt).
          # Any other usage is a regression to the old service-locator pattern
          # and must be replaced with Koin constructor injection.
          SHIM="core/common/src/main/kotlin/uy/kohesive/injekt/Injekt.kt"
          # Use grep -H to ensure consistent "path:line" output, then exclude the shim
          # by matching its full relative path component (without leading ./).
          VIOLATIONS=$(grep -rHn --include="*.kt" "Injekt\.get(" . \
            | grep -v "${SHIM}:" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Injekt.get() found outside the legacy shim (use Koin constructor injection instead):"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: Architecture fitness – no ephyra.data.* imports in core domain module
        run: |
          # The :core:domain module contains domain interactors and must not import
          # concrete :data implementations.  Interactors must depend only on repository
          # interfaces defined in :domain.  Any ephyra.data.* import in core/domain/src
          # is a Dependency Rule violation (domain must not know about the data layer).
          #
          # DomainModule.kt (the Koin wiring file) is explicitly excluded because it is
          # the single authorised place where interfaces are bound to implementations.
          VIOLATIONS=$(grep -rn --include="*.kt" "^\s*import ephyra\.data\." \
            core/domain/src 2>/dev/null \
            | grep -v "core/domain/src/main/java/ephyra/domain/DomainModule.kt:" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::ephyra.data.* imports found in core/domain (architectural violation):"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: Architecture fitness – data-boundary ratchet (feature modules must not import ephyra.data.*)
        run: |
          # Feature modules must not import concrete :data implementations directly.
          # They should reference only domain interfaces and types.
          #
          # All 38 previously-tracked violations have been resolved (data-layer types are now
          # accessed exclusively through domain interfaces injected by Koin).  BASELINE is set
          # to 0 so that any new direct data import in a feature module fails CI immediately.
          BASELINE=0
          VIOLATION_COUNT=$(grep -rn --include="*.kt" "^\s*import ephyra\.data\." \
            feature/*/src 2>/dev/null | wc -l || echo 0)
          echo "ephyra.data.* imports in feature modules: ${VIOLATION_COUNT} (baseline: ${BASELINE})"
          if [ "${VIOLATION_COUNT}" -gt "${BASELINE}" ]; then
            echo "::error::ephyra.data.* import count (${VIOLATION_COUNT}) exceeds baseline (${BASELINE})."
            echo "::error::Fix the new violations before merging, then lower BASELINE in build.yml."
            grep -rn --include="*.kt" "^\s*import ephyra\.data\." feature/*/src 2>/dev/null || true
            exit 1
          fi

      - name: Architecture fitness – all HomeScreen tabs must call signalReady()
        run: |
          # Every composable file that backs a tab in HomeScreen.TABS must call
          # (context as? AppReadySignal)?.signalReady() so that the splash screen is
          # dismissed as soon as that tab's content has loaded.  Without this call the
          # splash stays visible until SPLASH_MAX_DURATION (3 s) elapses and then
          # dismisses to a blank or still-loading screen — the primary symptom of the
          # "app silently unresponsive on start" bug class.
          #
          # If a tab is added to HomeScreen.TABS without the signalReady() call this
          # check will fail CI immediately, preventing the regression from reaching users.
          TABS=(
            "feature/library/src/main/kotlin/ephyra/feature/library/LibraryTab.kt"
            "feature/updates/src/main/kotlin/ephyra/feature/updates/UpdatesTab.kt"
            "feature/history/src/main/kotlin/ephyra/feature/history/HistoryTab.kt"
            "feature/browse/src/main/kotlin/ephyra/feature/browse/BrowseTab.kt"
            "feature/more/src/main/kotlin/ephyra/feature/more/MoreTab.kt"
          )
          MISSING=()
          for tab in "${TABS[@]}"; do
            if [ ! -f "$tab" ]; then
              MISSING+=("MISSING FILE: $tab")
            elif ! grep -q "AppReadySignal" "$tab"; then
              MISSING+=("$tab")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::The following HomeScreen tabs do not reference AppReadySignal / signalReady():"
            for f in "${MISSING[@]}"; do
              echo "::error::  $f"
            done
            echo "::error::Add a LaunchedEffect that calls (context as? AppReadySignal)?.signalReady()"
            echo "::error::when the tab's content has finished loading."
            exit 1
          fi
          echo "All ${#TABS[@]} HomeScreen tabs correctly reference AppReadySignal."

      - name: Build app
        run: |
          FLAGS="-Penable-updater"
          [ -f app/google-services.json ] && FLAGS="$FLAGS -Pinclude-telemetry"
          ./gradlew assembleRelease $FLAGS

      - name: Run unit tests
        id: unit_tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test report
        if: steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arm64-v8a-${{ github.sha }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk

      - name: Upload mapping
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mapping-${{ github.sha }}
          path: app/build/outputs/mapping/release
