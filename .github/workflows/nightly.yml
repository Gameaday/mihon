name: Nightly Build
on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish Nightly
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build app
        run: ./gradlew assembleNightly -Penable-updater -PversionCode=${{ github.run_number }}

      - name: Sign APK
        if: ${{ env.SIGNING_KEY != '' }}
        uses: r0adkll/sign-android-release@f30bdd30588842ac76044ecdbd4b6d0e3e813478
        with:
          releaseDirectory: app/build/outputs/apk/nightly
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '36.0.0'
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Sign APK with debug keystore (fallback when SIGNING_KEY is not configured)
        if: ${{ env.SIGNING_KEY == '' }}
        run: |
          set -e
          # Generate a temporary keystore so the APK is always installable
          keytool -genkeypair -v \
            -keystore /tmp/mihon-nightly.keystore \
            -storepass android \
            -alias nightlykey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Mihon Nightly,O=Mihon,C=US"

          # Locate apksigner from the Android SDK (installed by the Gradle build step)
          APKSIGNER="${ANDROID_HOME}/build-tools/36.0.0/apksigner"
          if [ ! -f "$APKSIGNER" ]; then
            # Fallback: find any available version
            APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name "apksigner" -type f 2>/dev/null | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          fi
          if [ -z "$APKSIGNER" ] || [ ! -f "$APKSIGNER" ]; then
            echo "::error::apksigner not found under ${ANDROID_HOME}/build-tools. Configure the SIGNING_KEY secret for production signing."
            exit 1
          fi

          for apk in app/build/outputs/apk/nightly/*-unsigned.apk; do
            [ -f "$apk" ] || continue
            signed="${apk%-unsigned.apk}-unsigned-signed.apk"
            "$APKSIGNER" sign \
              --ks /tmp/mihon-nightly.keystore \
              --ks-pass pass:android \
              --key-pass pass:android \
              --ks-key-alias nightlykey \
              --out "$signed" \
              "$apk"
          done
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Rename APKs
        run: |
          set -e
          cd app/build/outputs/apk/nightly
          SHORT_SHA="${GITHUB_SHA::7}"
          # Remove unsigned APKs if signed versions exist to avoid uploading unsigned APKs
          if ls *-signed.apk 2>/dev/null | grep -q .; then
            rm -f *-unsigned.apk
          fi
          for apk in *.apk; do
            new_name=$(echo "$apk" | sed -E 's/-nightly(-unsigned(-signed)?)?\.apk$//')
            mv "$apk" "${new_name}-nightly-${SHORT_SHA}.apk"
          done

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create nightly release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated nightly build from commit ${{ github.sha }}.

            Built from branch `${{ github.ref_name }}` at ${{ github.event.head_commit.timestamp }}.
          files: app/build/outputs/apk/nightly/*.apk
          prerelease: true
          make_latest: false
