name: Release
on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get_tag:
    if: github.repository == 'Gameaday/Ephyra'
    name: Extract tag name
    runs-on: 'ubuntu-24.04'
    permissions: { }
    outputs:
      tag: ${{ steps.extract.outputs.tag }}

    steps:
      - name: Get tag name
        id: extract
        run: echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

  build:
    if: github.repository == 'Gameaday/Ephyra'
    name: Build
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: read
    needs: get_tag

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build
        run: ./gradlew assembleRelease -Pinclude-telemetry -Penable-updater

      - name: Sign APK
        uses: r0adkll/sign-android-release@a391126403df92c6a0a3988a829dd47f79b89ed7
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '36.0.0'

      - name: Rename APK
        run: |
          set -e

          mv app/build/outputs/apk/release/app-universal-release-unsigned-signed.apk ephyra-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-arm64-v8a-release-unsigned-signed.apk ephyra-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned-signed.apk ephyra-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-x86-release-unsigned-signed.apk ephyra-x86-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-x86_64-release-unsigned-signed.apk ephyra-x86_64-${{ needs.get_tag.outputs.tag }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ephyra
          path: |
            ephyra-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-x86-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-x86_64-${{ needs.get_tag.outputs.tag }}.apk

  build_foss:
    if: github.repository == 'Gameaday/Ephyra'
    name: Build (FOSS)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: get_tag

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-disabled: true

      - name: Build
        run: ./gradlew assembleFoss -Penable-updater

      - name: Sign APK
        uses: r0adkll/sign-android-release@a391126403df92c6a0a3988a829dd47f79b89ed7
        with:
          releaseDirectory: app/build/outputs/apk/foss
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '36.0.0'

      - name: Rename APK
        run: |
          set -e

          mv app/build/outputs/apk/foss/app-universal-foss-unsigned-signed.apk ephyra-${{ needs.get_tag.outputs.tag }}-foss.apk

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ephyra-foss
          path: ephyra-${{ needs.get_tag.outputs.tag }}-foss.apk

  release:
    if: github.repository == 'Gameaday/Ephyra'
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs: [ get_tag, build, build_foss ]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Delete all artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          failOnError: false
          name: |
            ephyra
            ephyra-foss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.get_tag.outputs.tag }}
          name: Ephyra ${{ needs.get_tag.outputs.tag }}
          body: |
            Check out the [past release notes](https://github.com/Gameaday/Ephyra/releases) if you're upgrading from an earlier version.

            <!-->



            <!-->

            > [!TIP]
            >
            > ### If you are unsure which version to download then go with `ephyra-${{ needs.get_tag.outputs.tag }}.apk`
            >
            > **Samsung Galaxy S24 series (ARMv9.2-A / Snapdragon 8 Gen 3 · Exynos 2400):** use `ephyra-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk` for the best experience. The `arm64-v8a` ABI covers all 64-bit ARM devices including ARMv9.2-A.
          files: |
            ephyra-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-${{ needs.get_tag.outputs.tag }}-foss.apk
            ephyra-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-x86-${{ needs.get_tag.outputs.tag }}.apk
            ephyra-x86_64-${{ needs.get_tag.outputs.tag }}.apk
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
